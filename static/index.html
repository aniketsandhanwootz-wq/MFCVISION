<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gemini Scale Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1250px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
    }
    img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
      margin-top: 12px;
      background: #fafafa;
    }
    .grid4 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .value {
      font-size: 36px;
      font-weight: bold;
      margin-top: 8px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .ok {
      color: #0b7a0b;
    }
    .warn {
      color: #b35c00;
    }
    pre {
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    @media (max-width: 760px) {
      .grid4 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Gemini Scale Reader</h1>
  <p class="muted">Upload one image. Backend uses Gemini Flash-Lite to localize the display, then Gemini Flash reads the value with fallback verification.</p>

  <div class="card">
    <input id="fileInput" type="file" accept="image/*" />
    <br /><br />
    <button id="runBtn">Read Display</button>
  </div>

  <div class="card">
    <div class="grid4">
      <div>
        <div><strong>Original</strong></div>
        <img id="previewOriginal" alt="original preview" />
      </div>
      <div>
        <div><strong>Enhanced Full</strong></div>
        <img id="previewEnhanced" alt="enhanced preview" />
      </div>
      <div>
        <div><strong>Localized Crop</strong></div>
        <img id="previewCrop" alt="crop preview" />
      </div>
      <div>
        <div><strong>Detection Debug</strong></div>
        <img id="previewDebug" alt="debug preview" />
      </div>
    </div>
  </div>

  <div class="card">
    <div id="statusLine" class="muted">No result yet.</div>
    <div id="valueLine" class="value"></div>
    <pre id="jsonOutput">{}</pre>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const runBtn = document.getElementById("runBtn");
    const previewOriginal = document.getElementById("previewOriginal");
    const previewEnhanced = document.getElementById("previewEnhanced");
    const previewCrop = document.getElementById("previewCrop");
    const previewDebug = document.getElementById("previewDebug");
    const statusLine = document.getElementById("statusLine");
    const valueLine = document.getElementById("valueLine");
    const jsonOutput = document.getElementById("jsonOutput");

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      previewOriginal.src = url;
      previewOriginal.style.display = "block";
    });

    runBtn.addEventListener("click", async () => {
      const file = fileInput.files?.[0];
      if (!file) {
        alert("Please select an image.");
        return;
      }

      statusLine.textContent = "Reading image...";
      statusLine.className = "muted";
      valueLine.textContent = "";
      jsonOutput.textContent = "{}";

      try {
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch("/api/read-scale", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Request failed");
        }

        const t = Date.now();

        if (data.preview_urls?.original) {
          previewOriginal.src = data.preview_urls.original + `?t=${t}`;
          previewOriginal.style.display = "block";
        }
        if (data.preview_urls?.enhanced) {
          previewEnhanced.src = data.preview_urls.enhanced + `?t=${t}`;
          previewEnhanced.style.display = "block";
        }
        if (data.preview_urls?.crop) {
          previewCrop.src = data.preview_urls.crop + `?t=${t}`;
          previewCrop.style.display = "block";
        }
        if (data.preview_urls?.debug) {
          previewDebug.src = data.preview_urls.debug + `?t=${t}`;
          previewDebug.style.display = "block";
        }

        const finalResult = data.final || {};
        jsonOutput.textContent = JSON.stringify({
          final: finalResult,
          localization: data.localization || null,
          crop_diagnostics: data.crop_diagnostics || null
        }, null, 2);

        if (finalResult.status === "ok") {
          statusLine.textContent = `Status: ${finalResult.status} | confidence=${finalResult.confidence}`;
          statusLine.className = "ok";
          valueLine.textContent = finalResult.value_text ?? "";
        } else {
          statusLine.textContent = `Status: ${finalResult.status} | ${finalResult.reason}`;
          statusLine.className = "warn";
          valueLine.textContent = finalResult.value_text || "Needs review";
        }
      } catch (err) {
        statusLine.textContent = `Error: ${err.message}`;
        statusLine.className = "warn";
        jsonOutput.textContent = "{}";
      }
    });
  </script>
</body>
</html>
